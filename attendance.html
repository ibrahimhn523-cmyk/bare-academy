<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل التحضير — أكاديمية بارع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@font-face { font-family:'Bare'; src:url('./fonts/TheYearofHandicrafts-Regular.otf'); font-weight:400; }
@font-face { font-family:'Bare'; src:url('./fonts/TheYearofHandicrafts-Bold.otf');    font-weight:700; }

* { box-sizing:border-box; margin:0; padding:0; }

:root {
  --primary : #2D3651;
  --gold    : #c19d2e;
  --bg      : #f8fafc;
  --white   : #fff;
  --text    : #1e293b;
  --muted   : #64748b;
  --border  : #e2e8f0;
  --success : #10b981;
  --warning : #f59e0b;
  --danger  : #ef4444;
  --info    : #3b82f6;
  --sidebar : 250px;
  --topbar  : 58px;
}

body { font-family:'Bare','Tajawal','Segoe UI',sans-serif; background:var(--bg); color:var(--text); }

/* ── LOGIN SCREEN ── */
#login-screen {
  position:fixed; inset:0; background:var(--primary);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--white); border-radius:16px; padding:40px 36px;
  width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3);
  text-align:center;
}
.login-logo { height:56px; margin-bottom:18px; }
.login-title { font-size:1.4rem; font-weight:700; color:var(--primary); margin-bottom:6px; }
.login-sub { font-size:.85rem; color:var(--muted); margin-bottom:24px; }
.login-inp {
  width:100%; padding:11px 14px; border:1.5px solid var(--border);
  border-radius:9px; font-family:inherit; font-size:.95rem; outline:none;
  text-align:center; letter-spacing:.1em; margin-bottom:14px;
  transition:border-color .18s;
}
.login-inp:focus { border-color:var(--primary); }
.login-btn {
  width:100%; padding:12px; background:var(--primary); color:#fff;
  border:none; border-radius:9px; font-family:inherit; font-size:1rem;
  font-weight:700; cursor:pointer; transition:background .18s;
}
.login-btn:hover { background:#1e2740; }
.login-err { color:var(--danger); font-size:.82rem; margin-top:8px; display:none; }

/* ── APP SHELL ── */
#app { display:none; }

/* ── TOPBAR ── */
.topbar {
  position:fixed; top:0; right:0; left:0; height:var(--topbar);
  background:var(--primary); display:flex; align-items:center;
  justify-content:space-between; padding:0 18px; z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.topbar-left { display:flex; align-items:center; gap:10px; }
.burger { background:none; border:none; color:#fff; font-size:1.35rem; cursor:pointer; padding:4px 6px; border-radius:5px; }
.burger:hover { background:rgba(255,255,255,.12); }
.topbar-logo { height:34px; }
.topbar-title { color:#fff; font-size:1rem; font-weight:700; }
.topbar-right { display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.8); font-size:.85rem; }
.btn-logout {
  background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.25);
  color:#fff; padding:5px 13px; border-radius:6px; cursor:pointer;
  font-family:inherit; font-size:.82rem;
}
.btn-logout:hover { background:rgba(255,255,255,.24); }

/* ── SIDEBAR ── */
.sidebar {
  position:fixed; top:var(--topbar); right:0; width:var(--sidebar);
  height:calc(100vh - var(--topbar)); background:var(--primary);
  overflow-y:auto; z-index:150; transition:transform .28s ease;
}
.sidebar.hidden { transform:translateX(100%); }
.nav-section { padding:8px 0 4px; }
.nav-label { font-size:.68rem; color:rgba(255,255,255,.4); padding:8px 16px 4px; letter-spacing:.05em; text-transform:uppercase; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; color:rgba(255,255,255,.72); cursor:pointer;
  border-right:3px solid transparent; transition:all .18s; font-size:.9rem;
}
.nav-item:hover { background:rgba(255,255,255,.07); color:#fff; }
.nav-item.active { background:rgba(193,157,46,.18); color:var(--gold); border-right-color:var(--gold); }
.nav-icon { font-size:1.1rem; min-width:22px; text-align:center; }

/* ── MAIN ── */
.main {
  margin-right:var(--sidebar); margin-top:var(--topbar);
  padding:22px; min-height:calc(100vh - var(--topbar));
  transition:margin-right .28s;
}
.main.full { margin-right:0; }

/* ── PAGE HEADER ── */
.page-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.page-title { font-size:1.3rem; font-weight:700; color:var(--primary); }
.page-sub { font-size:.8rem; color:var(--muted); font-weight:400; margin-right:6px; }

/* ── BREADCRUMB ── */
.breadcrumb { display:flex; align-items:center; gap:6px; font-size:.85rem; color:var(--muted); margin-bottom:16px; flex-wrap:wrap; }
.breadcrumb span { cursor:pointer; transition:color .14s; }
.breadcrumb span:hover { color:var(--primary); }
.breadcrumb .bc-sep { color:var(--border); }
.breadcrumb .bc-active { color:var(--text); font-weight:600; cursor:default; }
.back-btn {
  background:none; border:1.5px solid var(--border); color:var(--muted);
  padding:6px 13px; border-radius:7px; cursor:pointer; font-family:inherit;
  font-size:.83rem; display:inline-flex; align-items:center; gap:5px;
  transition:all .16s;
}
.back-btn:hover { border-color:var(--primary); color:var(--primary); }

/* ── BUTTONS ── */
.btn {
  padding:8px 14px; border-radius:8px; border:none; cursor:pointer;
  font-family:inherit; font-size:.85rem; font-weight:600; transition:all .15s;
  display:inline-flex; align-items:center; gap:5px;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#1e2740; }
.btn-gold { background:var(--gold); color:#fff; }
.btn-gold:hover { background:#a8861d; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#059669; }
.btn-secondary { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
.btn-secondary:hover { background:var(--border); }

/* ── CARDS GRID (Programs & Groups) ── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
.prog-card, .group-card {
  background:var(--white); border-radius:14px; padding:22px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,.07); border:1.5px solid var(--border);
  cursor:pointer; transition:all .2s; text-align:right;
}
.prog-card:hover { box-shadow:0 6px 20px rgba(45,54,81,.14); border-color:var(--gold); transform:translateY(-2px); }
.group-card:hover { box-shadow:0 6px 18px rgba(45,54,81,.13); border-color:var(--primary); transform:translateY(-2px); }
.prog-card-icon { width:46px; height:46px; border-radius:11px; background:rgba(45,54,81,.08); display:flex; align-items:center; justify-content:center; font-size:1.35rem; margin-bottom:14px; }
.prog-card-name { font-size:1rem; font-weight:700; color:var(--primary); margin-bottom:8px; }
.prog-card-meta { font-size:.77rem; color:var(--muted); display:flex; gap:12px; flex-wrap:wrap; }
.group-card-icon { width:40px; height:40px; border-radius:9px; background:rgba(193,157,46,.1); display:flex; align-items:center; justify-content:center; font-size:1.15rem; margin-bottom:12px; }
.group-card-name { font-size:.98rem; font-weight:700; color:var(--text); margin-bottom:4px; }
.group-card-meta { font-size:.77rem; color:var(--muted); }

/* ── FILTER BAR ── */
.filter-bar {
  background:var(--white); border-radius:10px; padding:12px 14px;
  margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.filter-bar input {
  border:1px solid var(--border); border-radius:7px; padding:7px 11px;
  font-family:inherit; font-size:.88rem; background:var(--bg); color:var(--text);
  outline:none; transition:border-color .18s; flex:1; min-width:200px;
}
.filter-bar input:focus { border-color:var(--primary); }

/* ── BULK BAR ── */
.bulk-bar {
  background:rgba(45,54,81,.06); border:1.5px dashed rgba(45,54,81,.25);
  border-radius:10px; padding:12px 16px; margin-bottom:14px;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.bulk-bar select {
  border:1px solid var(--border); border-radius:7px; padding:6px 11px;
  font-family:inherit; font-size:.85rem; background:var(--white); color:var(--text);
  outline:none;
}
.bulk-bar label { font-size:.85rem; color:var(--muted); white-space:nowrap; }
.bulk-count-badge {
  background:var(--primary); color:#fff; font-size:.75rem; font-weight:700;
  padding:2px 8px; border-radius:10px;
}

/* ── ATTENDANCE TABLE ── */
.att-table-wrap { overflow-x:auto; background:var(--white); border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
.att-table { width:100%; border-collapse:collapse; min-width:700px; }
.att-table th {
  background:var(--primary); color:#fff; padding:10px 8px; font-size:.78rem;
  font-weight:600; text-align:center; white-space:nowrap;
}
.att-table th:first-child { text-align:right; padding-right:14px; }
.att-table td {
  padding:7px 5px; text-align:center; border-bottom:1px solid var(--border);
  font-size:.82rem;
}
.att-table td:first-child { text-align:right; padding-right:12px; font-weight:600; }
.att-table tr:last-child td { border-bottom:none; }
.att-table tr:hover td { background:rgba(45,54,81,.025); }
.att-table .week-header td {
  background:rgba(45,54,81,.06); font-weight:700; color:var(--primary);
  padding:8px 12px; font-size:.82rem; cursor:pointer;
  user-select:none;
}
.att-table .week-header td:hover { background:rgba(45,54,81,.1); }
.att-table .week-header.collapsed { display:none; }

/* Status select inside table */
.st-sel {
  border:1px solid var(--border); border-radius:6px; padding:4px 6px;
  font-family:inherit; font-size:.76rem; background:var(--bg); color:var(--text);
  outline:none; width:100%; min-width:86px; cursor:pointer;
  transition:background .14s;
}
.st-sel:focus { border-color:var(--primary); }
.st-sel[data-v="حاضر"]             { background:#d1fae5; color:#065f46; }
.st-sel[data-v="متأخر بعذر"]       { background:#fef3c7; color:#92400e; }
.st-sel[data-v="متأخر بغير عذر"]   { background:#ffedd5; color:#9a3412; }
.st-sel[data-v="غائب بعذر"]        { background:#f1f5f9; color:#475569; }
.st-sel[data-v="غائب بغير عذر"]    { background:#fee2e2; color:#991b1b; }

/* Student checkbox col */
.std-check { cursor:pointer; width:14px; height:14px; accent-color:var(--primary); }

/* ── WEEK HEADER ROW ── */
.week-hdr-row td { background:rgba(193,157,46,.1); color:var(--primary); font-weight:700; font-size:.83rem; padding:8px 12px; cursor:pointer; }
.week-hdr-row td:hover { background:rgba(193,157,46,.18); }

/* ── SAVE BUTTON AREA ── */
.save-bar { display:flex; justify-content:flex-end; margin-top:14px; gap:10px; }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(30px);
  background:var(--primary); color:#fff; padding:10px 22px; border-radius:10px;
  font-size:.88rem; opacity:0; transition:all .3s; pointer-events:none; z-index:9000;
  white-space:nowrap; box-shadow:0 6px 20px rgba(0,0,0,.2);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.error { background:var(--danger); }

/* ── SPINNER ── */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(45,54,81,.2); border-top-color:var(--primary); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
.empty-state .ei { font-size:2.5rem; margin-bottom:10px; }

/* ── RESPONSIVE ── */
@media (max-width:760px) {
  .sidebar { transform:translateX(100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-right:0; padding:14px; }
}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-box">
    <img src="./image/bare-logo.png" alt="بارع" class="login-logo" onerror="this.style.display='none'">
    <div class="login-title">أكاديمية بارع</div>
    <div class="login-sub">سجل التحضير والغياب</div>
    <input type="password" id="login-pwd" class="login-inp" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-err" id="login-err">كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <button class="burger" onclick="toggleSidebar()">☰</button>
    <img src="./image/bare-logo.png" alt="بارع" class="topbar-logo" onerror="this.style.display='none'">
    <span class="topbar-title">سجل التحضير</span>
  </div>
  <div class="topbar-right">
    <span id="topbar-group-label" style="font-size:.8rem;"></span>
    <button class="btn-logout" onclick="doLogout()">خروج</button>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="nav-section">
    <div class="nav-label">التحضير</div>
    <div class="nav-item active" id="nav-att" onclick="gotoPrograms()">
      <span class="nav-icon">✅</span>
      <span>سجل التحضير</span>
    </div>
    <div class="nav-item" onclick="doLogout()">
      <span class="nav-icon">🚪</span>
      <span>تسجيل الخروج</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main">

  <!-- ── VIEW 1: PROGRAMS ── -->
  <div id="view-programs">
    <div class="page-hdr">
      <div class="page-title">البرامج النشطة <span class="page-sub">اختر برنامجاً لبدء التحضير</span></div>
      <button class="btn btn-secondary" onclick="loadPrograms()">🔄 تحديث</button>
    </div>
    <div class="cards-grid" id="prog-cards">
      <div class="empty-state"><div class="ei"><span class="spinner"></span></div><p>جاري التحميل…</p></div>
    </div>
  </div>

  <!-- ── VIEW 2: GROUPS ── -->
  <div id="view-groups" style="display:none">
    <div class="page-hdr">
      <div>
        <button class="back-btn" onclick="gotoPrograms()">← العودة للبرامج</button>
      </div>
    </div>
    <div class="breadcrumb" id="bc-groups">
      <span onclick="gotoPrograms()">البرامج</span>
      <span class="bc-sep">/</span>
      <span class="bc-active" id="bc-prog-name">—</span>
    </div>
    <div class="page-title" id="groups-title" style="margin-bottom:14px;">المجموعات</div>
    <div class="cards-grid" id="group-cards"></div>
  </div>

  <!-- ── VIEW 3: ATTENDANCE TABLE ── -->
  <div id="view-table" style="display:none">
    <div class="page-hdr">
      <div>
        <button class="back-btn" onclick="gotoGroups()">← العودة للمجموعات</button>
      </div>
      <button class="btn btn-success" onclick="saveAllAttendance()">💾 حفظ التحضير</button>
    </div>
    <div class="breadcrumb" id="bc-table">
      <span onclick="gotoPrograms()">البرامج</span>
      <span class="bc-sep">/</span>
      <span onclick="gotoGroups()" id="bc-prog-name2">—</span>
      <span class="bc-sep">/</span>
      <span class="bc-active" id="bc-group-name">—</span>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <input type="text" id="att-search" placeholder="🔍 بحث بالاسم…" oninput="renderTable()">
    </div>

    <!-- Bulk Attendance Bar -->
    <div class="bulk-bar">
      <span style="font-size:.85rem;color:var(--text);font-weight:600;">تحضير جماعي:</span>
      <label>الأسبوع</label>
      <select id="bulk-week">
        <option value="">اختر</option>
      </select>
      <label>اليوم</label>
      <select id="bulk-day">
        <option value="الأحد">الأحد</option>
        <option value="الاثنين">الاثنين</option>
        <option value="الثلاثاء">الثلاثاء</option>
        <option value="الأربعاء">الأربعاء</option>
      </select>
      <label>الحالة</label>
      <select id="bulk-status">
        <option value="">اختر الحالة</option>
        <option value="حاضر">حاضر</option>
        <option value="متأخر بعذر">متأخر بعذر</option>
        <option value="متأخر بغير عذر">متأخر بغير عذر</option>
        <option value="غائب بعذر">غائب بعذر</option>
        <option value="غائب بغير عذر">غائب بغير عذر</option>
      </select>
      <span>للمحددين</span>
      <span class="bulk-count-badge" id="bulk-count-badge">0</span>
      <button class="btn btn-primary" onclick="applyBulk()">✅ تطبيق</button>
    </div>

    <!-- Table -->
    <div class="att-table-wrap">
      <table class="att-table" id="att-table">
        <thead id="att-thead"></thead>
        <tbody id="att-tbody"></tbody>
      </table>
    </div>

    <div class="save-bar">
      <button class="btn btn-success" onclick="saveAllAttendance()">💾 حفظ التحضير</button>
    </div>
  </div>

</main>
</div><!-- /app -->

<div id="toast"></div>

<script>
/* ════════════════════════════════════════
   SUPABASE CONFIG
════════════════════════════════════════ */
const SB_URL = 'https://oytfhgqhibbcsqbnvwyv.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dGZoZ3FoaWJiY3NxYm52d3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjgwNDgsImV4cCI6MjA5MDgwNDA0OH0.oX2f-gCIBn8cHvNbgYIrnFc5JeUXtQ_i0AreSqgBWJs';

const TB = {
  PROGRAMS      : 'programs',
  SUBSCRIPTIONS : 'subscriptions',
  ATTENDANCE    : 'attendance',
  SETTINGS      : 'settings'
};

function _h(extra = {}) {
  return {
    'apikey'        : SB_KEY,
    'Authorization' : `Bearer ${SB_KEY}`,
    'Content-Type'  : 'application/json',
    'Prefer'        : 'return=minimal',
    ...extra
  };
}

async function sbGet(table, query = '') {
  const r = await fetch(`${SB_URL}/${table}?${query}`, { headers: _h() });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
  return r.json();
}

async function sbPost(table, data) {
  const r = await fetch(`${SB_URL}/${table}`, {
    method: 'POST', headers: _h(), body: JSON.stringify(data)
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
}

async function sbUpsert(table, data) {
  const r = await fetch(`${SB_URL}/${table}`, {
    method: 'POST',
    headers: _h({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(data)
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let _progs    = [];
let _students = [];   // subscriptions for selected program+group
let _attData  = {};   // { studentId_week_day : status }
let _selProg  = null; // selected program object
let _selGroup = null; // selected group name
let _weeks    = [];   // array of { weekNum, dates[4] }
let _collapsedWeeks = new Set();
let _selectedStudents = new Set();
let _sidebarOpen = true;

/* ════════════════════════════════════════
   LOGIN
════════════════════════════════════════ */
async function doLogin() {
  const pwd = document.getElementById('login-pwd').value.trim();
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!pwd) return;

  try {
    const rows = await sbGet(TB.SETTINGS, `key=eq.attendance_password&select=value`);
    const correct = rows?.[0]?.value || 'bare1212';
    if (pwd === correct) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadPrograms();
    } else {
      errEl.style.display = 'block';
      document.getElementById('login-pwd').value = '';
      document.getElementById('login-pwd').focus();
    }
  } catch(e) {
    // Fallback: check against default password if Supabase unreachable
    if (pwd === 'bare1212') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadPrograms();
    } else {
      errEl.style.display = 'block';
    }
  }
}

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pwd').value = '';
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function show(id) {
  ['view-programs','view-groups','view-table'].forEach(v => {
    document.getElementById(v).style.display = v === id ? '' : 'none';
  });
}

function gotoPrograms() {
  _selProg = null; _selGroup = null;
  document.getElementById('topbar-group-label').textContent = '';
  show('view-programs');
}

function gotoGroups() {
  if (!_selProg) return gotoPrograms();
  renderGroups();
  show('view-groups');
}

/* ════════════════════════════════════════
   PROGRAMS VIEW
════════════════════════════════════════ */
async function loadPrograms() {
  document.getElementById('prog-cards').innerHTML =
    `<div class="empty-state"><div class="ei"><span class="spinner"></span></div><p>جاري التحميل…</p></div>`;
  try {
    _progs = await sbGet(TB.PROGRAMS, `status=eq.نشط&order=id.asc`);
    renderProgs();
  } catch(e) {
    document.getElementById('prog-cards').innerHTML =
      `<div class="empty-state"><div class="ei">⚠️</div><p>خطأ في التحميل: ${e.message}</p></div>`;
  }
}

function renderProgs() {
  const el = document.getElementById('prog-cards');
  if (!_progs.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">📋</div><p>لا توجد برامج نشطة حالياً</p></div>`;
    return;
  }
  el.innerHTML = _progs.map(p => {
    const groups = p.groups ? p.groups.split('،').map(s => s.trim()).filter(Boolean) : [];
    return `
      <div class="prog-card" onclick="selectProgram(${p.id})">
        <div class="prog-card-icon">📚</div>
        <div class="prog-card-name">${esc(p.name)}</div>
        <div class="prog-card-meta">
          <span>📅 ${p.startDate || '—'} ← ${p.endDate || '—'}</span>
          <span>👥 ${groups.length} مجموعة</span>
        </div>
      </div>`;
  }).join('');
}

async function selectProgram(progId) {
  _selProg = _progs.find(p => p.id == progId);
  if (!_selProg) return;
  renderGroups();
  show('view-groups');
}

/* ════════════════════════════════════════
   GROUPS VIEW
════════════════════════════════════════ */
function renderGroups() {
  document.getElementById('bc-prog-name').textContent = _selProg.name;
  document.getElementById('groups-title').textContent = `مجموعات برنامج: ${_selProg.name}`;

  const groups = _selProg.groups
    ? _selProg.groups.split('،').map(s => s.trim()).filter(Boolean)
    : [];

  const el = document.getElementById('group-cards');
  if (!groups.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">👥</div><p>لم يتم إضافة مجموعات لهذا البرنامج</p></div>`;
    return;
  }
  el.innerHTML = groups.map(g => `
    <div class="group-card" onclick="selectGroup('${escAttr(g)}')">
      <div class="group-card-icon">👥</div>
      <div class="group-card-name">${esc(g)}</div>
      <div class="group-card-meta">انقر لفتح جدول التحضير</div>
    </div>`
  ).join('');
}

/* ════════════════════════════════════════
   TABLE VIEW
════════════════════════════════════════ */
async function selectGroup(groupName) {
  _selGroup = groupName;
  _selectedStudents = new Set();
  _attData = {};

  document.getElementById('bc-prog-name2').textContent = _selProg.name;
  document.getElementById('bc-group-name').textContent = _selGroup;
  document.getElementById('topbar-group-label').textContent = `${_selProg.name} / ${_selGroup}`;
  document.getElementById('att-search').value = '';

  // Calculate 8 weeks from program start date
  _weeks = buildWeeks(_selProg.startDate);

  // Populate bulk-week
  const bw = document.getElementById('bulk-week');
  bw.innerHTML = '<option value="">اختر</option>' +
    _weeks.map(w => `<option value="${w.weekNum}">الأسبوع ${w.weekNum}</option>`).join('');

  show('view-table');

  // Load students
  try {
    toast('جاري تحميل الطلاب…');
    _students = await sbGet(TB.SUBSCRIPTIONS,
      `programId=eq.${_selProg.id}&groupName=eq.${encodeURIComponent(_selGroup)}&order=id.asc`);
    if (!_students.length) {
      // fallback: try category field
      _students = await sbGet(TB.SUBSCRIPTIONS,
        `programId=eq.${_selProg.id}&category=eq.${encodeURIComponent(_selGroup)}&order=id.asc`);
    }
  } catch(e) {
    toast('خطأ في تحميل الطلاب: ' + e.message, 'error');
    _students = [];
  }

  // Load existing attendance
  try {
    const rows = await sbGet(TB.ATTENDANCE,
      `programId=eq.${_selProg.id}&groupName=eq.${encodeURIComponent(_selGroup)}&select=*`);
    rows.forEach(r => {
      const k = attKey(r.studentId, r.weekNum, r.dayName);
      _attData[k] = r.status;
    });
  } catch(e) { console.warn('load att:', e.message); }

  renderTable();
}

const DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء'];

function buildWeeks(startDateStr) {
  const weeks = [];
  let base;
  if (startDateStr) {
    base = new Date(startDateStr);
    if (isNaN(base)) base = new Date();
  } else {
    base = new Date();
  }
  // Start from Sunday of that week
  const day = base.getDay(); // 0=Sun
  base.setDate(base.getDate() - day);
  for (let w = 1; w <= 8; w++) {
    const wStart = new Date(base);
    wStart.setDate(base.getDate() + (w - 1) * 7);
    const dates = DAYS.map((d, i) => {
      const dd = new Date(wStart);
      dd.setDate(wStart.getDate() + i);
      return dd.toISOString().split('T')[0];
    });
    weeks.push({ weekNum: w, dates });
  }
  return weeks;
}

function attKey(studentId, weekNum, dayName) {
  return `${studentId}_${weekNum}_${dayName}`;
}

function renderTable() {
  const query = document.getElementById('att-search').value.toLowerCase();
  const students = _students.filter(s =>
    !query || (s.studentName || '').toLowerCase().includes(query)
  );

  updateBulkBadge();

  // Build thead
  const thead = document.getElementById('att-thead');
  let thHtml = `<tr>
    <th style="width:34px"><input type="checkbox" id="check-all" onchange="toggleAllStudents(this)"></th>
    <th style="min-width:140px;text-align:right">الطالب</th>`;
  _weeks.forEach(w => {
    thHtml += `<th colspan="${DAYS.length}" style="border-right:2px solid rgba(255,255,255,.2)">الأسبوع ${w.weekNum}</th>`;
  });
  thHtml += '</tr><tr><th></th><th></th>';
  _weeks.forEach(w => {
    DAYS.forEach(d => {
      thHtml += `<th style="font-size:.7rem;background:#1e2740;white-space:nowrap">${d}</th>`;
    });
  });
  thHtml += '</tr>';
  thead.innerHTML = thHtml;

  // Build tbody
  const tbody = document.getElementById('att-tbody');
  if (!students.length) {
    tbody.innerHTML = `<tr><td colspan="100" style="text-align:center;padding:28px;color:var(--muted)">لا توجد طلاب في هذه المجموعة</td></tr>`;
    return;
  }
  tbody.innerHTML = students.map((s, idx) => {
    const checked = _selectedStudents.has(s.id) ? 'checked' : '';
    let row = `<tr>
      <td><input type="checkbox" class="std-check" value="${s.id}" ${checked} onchange="toggleStudentSel(this)"></td>
      <td>${idx+1}. ${esc(s.studentName || s.fullName || '')}</td>`;
    _weeks.forEach(w => {
      DAYS.forEach(d => {
        const k = attKey(s.id, w.weekNum, d);
        const v = _attData[k] || '';
        row += `<td><select class="st-sel" data-v="${v}" data-sid="${s.id}" data-w="${w.weekNum}" data-d="${d}" onchange="onAttChange(this)">${statusOpts(v)}</select></td>`;
      });
    });
    row += '</tr>';
    return row;
  }).join('');
}

function statusOpts(cur) {
  const opts = ['','حاضر','متأخر بعذر','متأخر بغير عذر','غائب بعذر','غائب بغير عذر'];
  return opts.map(o => `<option value="${o}" ${cur === o ? 'selected' : ''}>${o || '— لم يحدد —'}</option>`).join('');
}

function onAttChange(sel) {
  const v = sel.value;
  sel.dataset.v = v;
  _attData[attKey(sel.dataset.sid, sel.dataset.w, sel.dataset.d)] = v;
}

/* ── Selection ── */
function toggleAllStudents(cb) {
  _selectedStudents = new Set();
  if (cb.checked) {
    _students.forEach(s => _selectedStudents.add(s.id));
    document.querySelectorAll('.std-check').forEach(c => c.checked = true);
  } else {
    document.querySelectorAll('.std-check').forEach(c => c.checked = false);
  }
  updateBulkBadge();
}

function toggleStudentSel(cb) {
  if (cb.checked) _selectedStudents.add(parseInt(cb.value));
  else            _selectedStudents.delete(parseInt(cb.value));
  updateBulkBadge();
  const all = document.getElementById('check-all');
  if (all) {
    all.indeterminate = _selectedStudents.size > 0 && _selectedStudents.size < _students.length;
    all.checked = _selectedStudents.size === _students.length;
  }
}

function updateBulkBadge() {
  document.getElementById('bulk-count-badge').textContent = _selectedStudents.size;
}

/* ── Bulk Apply ── */
function applyBulk() {
  const weekNum = parseInt(document.getElementById('bulk-week').value) || 0;
  const dayName = document.getElementById('bulk-day').value;
  const status  = document.getElementById('bulk-status').value;
  if (!weekNum || !status) { toast('اختر الأسبوع واليوم والحالة', 'error'); return; }
  if (!_selectedStudents.size) { toast('حدد طلاباً أولاً', 'error'); return; }
  _selectedStudents.forEach(sid => {
    const k = attKey(sid, weekNum, dayName);
    _attData[k] = status;
  });
  renderTable();
  toast(`تم تطبيق "${status}" على ${_selectedStudents.size} طالب`);
}

/* ── Save ── */
async function saveAllAttendance() {
  const entries = Object.entries(_attData).filter(([,v]) => v);
  if (!entries.length) { toast('لا توجد بيانات لحفظها', 'error'); return; }

  toast('جاري الحفظ… ⏳');
  const rows = [];
  entries.forEach(([k, status]) => {
    const [studentId, weekNum, ...dayParts] = k.split('_');
    const dayName = dayParts.join('_');
    const student = _students.find(s => s.id == studentId);
    const date = (_weeks.find(w => w.weekNum == weekNum)?.dates || [])[DAYS.indexOf(dayName)] || '';
    rows.push({
      programId   : _selProg.id,
      programName : _selProg.name,
      groupName   : _selGroup,
      studentId   : parseInt(studentId),
      studentName : student?.studentName || student?.fullName || '',
      weekNum     : parseInt(weekNum),
      dayName,
      date,
      status,
      createdAt   : new Date().toISOString()
    });
  });

  try {
    // Insert in batches of 50 using upsert on composite key
    const batch = 50;
    for (let i = 0; i < rows.length; i += batch) {
      await sbUpsert(TB.ATTENDANCE, rows.slice(i, i + batch));
    }
    toast(`تم الحفظ بنجاح ✅ (${rows.length} سجل)`);
  } catch(e) {
    // Fallback: try inserting one by one
    let saved = 0;
    for (const row of rows) {
      try { await sbPost(TB.ATTENDANCE, row); saved++; } catch {}
    }
    if (saved > 0) toast(`تم الحفظ جزئياً ✅ (${saved} سجل)`);
    else toast('خطأ في الحفظ: ' + e.message, 'error');
  }
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/'/g,'\\\'').replace(/"/g,'&quot;'); }

let _toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3200);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const mn = document.getElementById('main');
  if (window.innerWidth <= 760) {
    sb.classList.toggle('open');
  } else {
    _sidebarOpen = !_sidebarOpen;
    sb.classList.toggle('hidden', !_sidebarOpen);
    mn.classList.toggle('full', !_sidebarOpen);
  }
}

document.getElementById('login-pwd').focus();
