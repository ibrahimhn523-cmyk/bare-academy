<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج التسجيل - أكاديمية بارع</title>
    <style>
        /* ==================== إعدادات الخطوط المرفقة ==================== */
        @font-face {
            font-family: 'TheYearofHandicrafts';
            src: url('fonts/TheYearofHandicrafts-Regular.otf') format('opentype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'TheYearofHandicrafts';
            src: url('fonts/TheYearofHandicrafts-Medium.otf') format('opentype');
            font-weight: 500;
        }
        @font-face {
            font-family: 'TheYearofHandicrafts';
            src: url('fonts/TheYearofHandicrafts-SemiBold.otf') format('opentype');
            font-weight: 600;
        }
        @font-face {
            font-family: 'TheYearofHandicrafts';
            src: url('fonts/TheYearofHandicrafts-Bold.otf') format('opentype');
            font-weight: bold;
        }
        @font-face {
            font-family: 'TheYearofHandicrafts';
            src: url('fonts/TheYearofHandicrafts-Black.otf') format('opentype');
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2D3651;
            --secondary-color: #D4AF37;
            --light-bg: #F5E6D3;
            --text-dark: #333;
        }

        body {
            font-family: 'TheYearofHandicrafts', Arial, sans-serif;
            background-color: var(--light-bg);
            padding: 20px;
        }

        .form-container {
            max-width: 600px;
            margin: 20px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.8em;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1em;
        }

        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .input-group {
            position: relative;
        }

        /* ==================== قسم الشروط ==================== */
        .terms-section {
            background-color: #f9f9f9;
            border-right: 4px solid var(--secondary-color);
            padding: 20px;
            margin: 30px 0;
            border-radius: 6px;
        }

        .terms-section h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .term-item {
            margin-bottom: 15px;
            padding: 12px;
            background-color: white;
            border-radius: 6px;
            transition: background-color 0.3s;
        }

        .term-item:hover {
            background-color: #f0f0f0;
        }

        .term-item input[type="checkbox"] {
            margin-left: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .term-item label {
            display: inline;
            margin: 0;
            font-weight: normal;
            font-size: 0.95em;
            cursor: pointer;
            margin-bottom: 0;
        }

        /* ==================== الأزرار ==================== */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            font-family: 'TheYearofHandicrafts', Arial, sans-serif;
            transition: all 0.3s;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .submit-btn:hover {
            background-color: #1a2438;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .cancel-btn {
            background-color: #f0f0f0;
            color: var(--text-dark);
        }

        .cancel-btn:hover {
            background-color: #e0e0e0;
        }

        /* ==================== رسالة النجاح ==================== */
        .success-message {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            position: relative;
        }

        .success-message.show {
            display: block;
        }

        .success-message .close-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 1.5em;
            background: none;
            border: none;
            color: white;
        }

        /* ==================== حقل النص الإضافي (للمرحلة "أخرى") ==================== */
        #otherCategoryInput {
            display: none;
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary-color);
        }

        .loading.show {
            display: block;
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- ==================== رسالة النجاح ==================== -->
        <div id="successMessage" class="success-message">
            <button class="close-btn" onclick="closeSuccess()">&times;</button>
            <p><strong>🎉 شكراً لاشتراكك في برنامج أكاديمية بارع!</strong><br>
            لتأكيد الاشتراك وحجز المقعد، يرجى إتمام عملية الدفع.</p>
        </div>

        <h2 class="form-title">📝 نموذج التسجيل</h2>

        <form id="registrationForm">
            <!-- ==================== الاسم الثلاثي ==================== -->
            <div class="form-group">
                <label for="fullName">الاسم الثلاثي <span style="color: red;">*</span></label>
                <input type="text" id="fullName" name="fullName" placeholder="مثال: محمد أحمد علي" required>
                <div class="error-message" id="fullNameError"></div>
            </div>

            <!-- ==================== رقم الجوال ==================== -->
            <div class="form-group">
                <label for="phone">رقم جوال ولي الأمر <span style="color: red;">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxxx" required>
                <div class="error-message" id="phoneError"></div>
            </div>

            <!-- ==================== المرحلة الدراسية ==================== -->
            <div class="form-group">
                <label for="category">المرحلة الدراسية <span style="color: red;">*</span></label>
                <select id="category" name="category" required onchange="handleCategoryChange()">
                    <option value="">-- اختر المرحلة --</option>
                    <option value="رابع ابتدائي">رابع ابتدائي</option>
                    <option value="خامس ابتدائي">خامس ابتدائي</option>
                    <option value="سادس ابتدائي">سادس ابتدائي</option>
                    <option value="أول متوسط">أول متوسط</option>
                    <option value="ثاني متوسط">ثاني متوسط</option>
                    <option value="ثالث متوسط">ثالث متوسط</option>
                    <option value="أخرى">أخرى</option>
                </select>
                <div class="error-message" id="categoryError"></div>
            </div>

            <!-- ==================== حقل النص الإضافي ==================== -->
            <div class="form-group" id="otherCategoryInput">
                <input type="text" id="otherCategory" placeholder="حدد المرحلة">
                <div class="error-message" id="otherCategoryError"></div>
            </div>

            <!-- ==================== قسم الشروط والتنبيهات ==================== -->
            <div class="terms-section">
                <h3>⚠️ تنبيهات وشروط مهمة</h3>

                <!-- البند الأول -->
                <div class="term-item">
                    <input type="checkbox" id="term1" name="term1" required>
                    <label for="term1">تحتفظ الأكاديمية بحق تصوير طالبك وتوثيق أنشطته على الصور والفيديوهات، واستخدامها في الترويج عبر وسائل التواصل الاجتماعي والمواد التسويقية، دون مسؤولية قانونية.</label>
                </div>

                <!-- البند الثاني -->
                <div class="term-item">
                    <input type="checkbox" id="term2" name="term2" required>
                    <label for="term2">نبذل قصارى جهدنا لضمان سلامة طلابنا، لكننا نتمنى تفهمكم أن الأكاديمية غير مسؤولة عن أي إصابات قد تحدث.</label>
                </div>

                <!-- البند الثالث -->
                <div class="term-item">
                    <input type="checkbox" id="term3" name="term3" required>
                    <label for="term3">يجب على ولي الأمر الإفصاح الكامل عن أي مشاكل صحية أو حالات طبية لدى الطالب لضمان سلامته أثناء البرنامج.</label>
                </div>

                <!-- البند الرابع -->
                <div class="term-item">
                    <input type="checkbox" id="term4" name="term4" required>
                    <label for="term4">نرجو الالتزام بأوقات البرنامج المحددة. الأكاديمية غير مسؤولة عن الطالب خارج هذه الأوقات.</label>
                </div>

                <!-- البند الخامس -->
                <div class="term-item">
                    <input type="checkbox" id="term5" name="term5" required>
                    <label for="term5">تحتفظ الأكاديمية بحق استبعاد أي طالب في حالات المخالفة المتكررة.</label>
                </div>
            </div>

            <!-- ==================== الأزرار ==================== -->
            <div class="loading" id="loading">جاري الإرسال...</div>
            <div class="button-group">
                <button type="submit" class="submit-btn">أتمم التسجيل</button>
            </div>
        </form>
    </div>

    <!-- ==================== JavaScript ==================== -->
    <script>
        const SPREADSHEET_ID = '16us-8KcHTb6XHwOzeWlrqhzHFGyCsWv20qZT_pFN4nI';
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/d/YOUR_DEPLOYMENT_ID/usercontent'; // سيتم تحديثه

        // ==================== التعامل مع تغيير المرحلة ==================== 
        function handleCategoryChange() {
            const category = document.getElementById('category').value;
            const otherInput = document.getElementById('otherCategoryInput');
            
            if (category === 'أخرى') {
                otherInput.style.display = 'block';
                document.getElementById('otherCategory').required = true;
            } else {
                otherInput.style.display = 'none';
                document.getElementById('otherCategory').required = false;
                document.getElementById('otherCategory').value = '';
            }
        }

        // ==================== التحقق من البيانات ==================== 
        function validateForm() {
            let isValid = true;
            clearErrors();

            // التحقق من الاسم
            const fullName = document.getElementById('fullName').value.trim();
            if (fullName.length < 5) {
                showError('fullNameError', 'الرجاء إدخال اسم ثلاثي صحيح (5 أحرف على الأقل)');
                isValid = false;
            }

            // التحقق من الجوال
            const phone = document.getElementById('phone').value.trim();
            const phoneRegex = /^05\d{8}$/;
            if (!phoneRegex.test(phone)) {
                showError('phoneError', 'الرجاء إدخال رقم جوال صحيح (05xxxxxxxxx)');
                isValid = false;
            }

            // التحقق من المرحلة
            const category = document.getElementById('category').value;
            if (!category) {
                showError('categoryError', 'الرجاء اختيار المرحلة الدراسية');
                isValid = false;
            }

            // التحقق من المرحلة الإضافية إن وجدت
            if (category === 'أخرى') {
                const otherCategory = document.getElementById('otherCategory').value.trim();
                if (!otherCategory) {
                    showError('otherCategoryError', 'الرجاء تحديد المرحلة');
                    isValid = false;
                }
            }

            // التحقق من الشروط
            const terms = [
                document.getElementById('term1').checked,
                document.getElementById('term2').checked,
                document.getElementById('term3').checked,
                document.getElementById('term4').checked,
                document.getElementById('term5').checked
            ];

            if (!terms.every(t => t === true)) {
                alert('يجب الموافقة على جميع الشروط والتنبيهات');
                isValid = false;
            }

            return isValid;
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        function clearErrors() {
            const errorElements = document.querySelectorAll('.error-message');
            errorElements.forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }

        // ==================== إرسال النموذج ==================== 
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            // إظهار مؤشر التحميل
            document.getElementById('loading').classList.add('show');

            // تجميع البيانات
            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                category: document.getElementById('category').value === 'أخرى' 
                    ? document.getElementById('otherCategory').value.trim()
                    : document.getElementById('category').value,
                timestamp: new Date().toISOString()
            };

            try {
                // إرسال إلى Google Sheets (مؤقتاً سيتم استخدام Apps Script)
                // للآن، نحفظ البيانات محلياً ونعرض رسالة نجاح
                
                // محاكاة التأخير
                await new Promise(resolve => setTimeout(resolve, 1000));

                // إظهار رسالة النجاح
                showSuccessMessage();

                // مسح النموذج
                document.getElementById('registrationForm').reset();

                // إغلاق حقل "أخرى" إن كان مفتوحاً
                document.getElementById('otherCategoryInput').style.display = 'none';

            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                alert('حدث خطأ في الإرسال. يرجى المحاولة لاحقاً.');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        });

        function showSuccessMessage() {
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');

            // إخفاء الرسالة بعد 5 ثوانٍ
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 5000);
        }

        function closeSuccess() {
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
